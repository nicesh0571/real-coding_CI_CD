name: Petclinic CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - closed

jobs:
  maven-build:
    name: Maven Build
    if: github.event_name == 'push' || github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build application
        run: ./mvnw -B -DskipTests package

  docker-build:
    name: Docker Build and Deploy
    needs: maven-build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag spring-petclinic:${{ github.sha }} \
            --tag spring-petclinic:latest \
            .

      - name: Deploy container
        run: |
          docker rm -f spring-petclinic || true
          docker ps -q --filter "publish=8080" \
            | xargs -r docker rm -f
          docker run -d \
            --name spring-petclinic \
            --restart unless-stopped \
            -p 8080:8080 \
            spring-petclinic:latest
          docker ps --filter name=spring-petclinic
