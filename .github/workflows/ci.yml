name: Petclinic GitHub CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build application
        run: ./mvnw -B -DskipTests package

  deploy:
    name: Docker Build and Deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        shell: powershell
        run: |
          docker build `
            --tag spring-petclinic:${{ github.sha }} `
            --tag spring-petclinic:latest `
            .

      - name: Deploy container
        shell: powershell
        run: |
          docker rm -f spring-petclinic 2>$null
          docker run -d `
            --name spring-petclinic `
            --restart unless-stopped `
            -p 8080:8080 `
            spring-petclinic:latest
          docker ps --filter name=spring-petclinic
